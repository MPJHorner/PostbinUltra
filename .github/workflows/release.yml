name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (Linux ARM64 only)
        if: matrix.cross
        run: |
          cargo install cross --locked
          echo "CARGO=cross" >> "$GITHUB_ENV"

      - name: Build
        shell: bash
        run: |
          ${CARGO:-cargo} build --release --target ${{ matrix.target }}

      - name: Determine version
        id: version
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          EVENT: ${{ github.event_name }}
        run: |
          if [[ "$EVENT" == "push" ]]; then
            echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${INPUT_TAG#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          name="postbin-ultra-${VERSION}-${TARGET}"
          mkdir -p "dist/${name}"
          cp "target/${TARGET}/release/postbin-ultra" "dist/${name}/"
          cp README.md LICENSE "dist/${name}/"
          (cd dist && tar -czf "${name}.tar.gz" "${name}")
          (cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256")

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          $name = "postbin-ultra-$env:VERSION-$env:TARGET"
          New-Item -ItemType Directory -Path "dist/$name" -Force | Out-Null
          Copy-Item "target/$env:TARGET/release/postbin-ultra.exe" "dist/$name/"
          Copy-Item README.md "dist/$name/"
          Copy-Item LICENSE "dist/$name/"
          Compress-Archive -Path "dist/$name" -DestinationPath "dist/$name.zip"
          $hash = Get-FileHash -Algorithm SHA256 "dist/$name.zip"
          "$($hash.Hash.ToLower())  $name.zip" | Out-File -Encoding ascii "dist/$name.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: postbin-ultra-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          EVENT: ${{ github.event_name }}
        run: |
          if [[ "$EVENT" == "push" ]]; then
            echo "tag=${REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" \) -exec cp {} release/ \;
          ls -la release

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/*.tar.gz
            release/*.zip
            release/*.sha256
