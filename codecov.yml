# Codecov configuration. The badge in the README reflects what's reported here.
#
# Files excluded from coverage on purpose. Each file's own header comment
# explains why; the short version:
#
# - crates/postbin-ultra/src/update.rs               — self-update via GitHub
#                                                       releases API. Pure
#                                                       helpers (parse_semver,
#                                                       is_newer) are unit-
#                                                       tested directly; the
#                                                       network paths can't be
#                                                       deterministically
#                                                       exercised.
# - crates/postbin-ultra-desktop/src/main.rs         — eframe entry; wraps the
#                                                       tested DesktopApp::new.
# - crates/postbin-ultra-desktop/src/app.rs          — eframe::App impl. Pure
#                                                       rendering. Pure-data
#                                                       helpers (build_raw,
#                                                       format_label,
#                                                       forwarded_tab_label,
#                                                       …) ARE unit-tested
#                                                       inline; the egui
#                                                       layout passes can't
#                                                       be driven from a unit
#                                                       test.
# - crates/postbin-ultra-desktop/src/widgets.rs      — egui widgets. Tested
#                                                       indirectly via state
#                                                       and visual smoke
#                                                       tests.
# - crates/postbin-ultra-desktop/src/icon.rs         — bytes-to-IconData. Pure
#                                                       embedded asset glue.
# - crates/postbin-ultra-desktop/src/fonts.rs        — registers bundled font
#                                                       files via include_bytes!.
# - crates/postbin-ultra-desktop/src/update.rs       — same as the lib's
#                                                       update.rs (network).
# - tools/**                                         — manual build-time tools
#                                                       (icon-gen).

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: false
    patch:
      default:
        target: 90%
        threshold: 5%

ignore:
  - "crates/postbin-ultra-desktop/src/main.rs"
  - "crates/postbin-ultra-desktop/src/app.rs"
  - "crates/postbin-ultra-desktop/src/widgets.rs"
  - "crates/postbin-ultra-desktop/src/icon.rs"
  - "crates/postbin-ultra-desktop/src/fonts.rs"
  - "crates/postbin-ultra-desktop/src/update.rs"
  - "crates/postbin-ultra/src/update.rs"
  - "tools/**"

comment:
  layout: "diff, flags, files"
  behavior: default
  require_changes: false
