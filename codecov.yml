# Codecov configuration. The badge in the README reflects what's reported here.
#
# We exclude three files from coverage on purpose:
# - src/main.rs        — binary entry point. Already exercised end-to-end by
#                        the integration smoke tests via `app::run`. Re-running
#                        the bin under coverage would add noise without value.
# - src/assets.rs      — a single `derive(RustEmbed)` declaration. The macro
#                        expansion is verified implicitly by every test that
#                        serves a static asset.
# - src/update.rs      — the `--update` self-update flow makes real GitHub API
#                        calls. The pure logic (parse_semver, is_newer) is
#                        unit-tested; the network paths are not, so we exclude
#                        them rather than ship flaky network-dependent tests.

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: false
    patch:
      default:
        target: 90%
        threshold: 5%

ignore:
  - "src/main.rs"
  - "src/assets.rs"
  - "src/update.rs"

comment:
  layout: "diff, flags, files"
  behavior: default
  require_changes: false
